<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Weaver Editor - Demo</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Tailwind CSS via CDN (apenas para testes) com plugin de tipografia -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

  <!-- ARQUIVO ÚNICO DO EDITOR (Gerado pelo Gulp) -->
  <script src="../dist/weaver-editor.min.js"></script>

</head>
<body class="bg-gray-50 p-8 text-gray-800 font-sans">

  <div class="max-w-5xl mx-auto bg-white p-8 shadow-sm border border-gray-200 rounded-lg">
    <h1 class="text-3xl font-bold mb-6 text-gray-900">Weaver Editor</h1>

    <form action="/enviar" method="POST">
      <textarea id="meu-editor" name="artigo_html" placeholder="Escreva seu artigo lindo aqui..."></textarea>
      <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white mt-4 py-2 px-4 rounded">Salvar Artigo</button>
    </form>
  </div>

  <script>
      $('#meu-editor').weaver({
        height: 500, // Define a altura customizada em pixels
        placeholder: 'Digite seu conteúdo aqui...', // Sobrescreve o placeholder
        toolbar: [
          ['history', ['undo', 'redo']],
          ['style', ['style', 'fontName', 'fontSize']],
          ['font', ['bold', 'italic', 'underline', 'strikethrough', 'clear']],
          ['color'],
          ['para', ['ul', 'ol', 'paragraph']],
          ['insert', ['link', 'table', 'picture', 'video', 'hr']],
          ['view', ['preview', 'fullscreen', 'showBlocks', 'codeview']]
        ]
      });
  </script>

</html>
