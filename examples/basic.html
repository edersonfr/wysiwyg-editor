<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Editor Example</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- CORE -->
  <script src="../src/core/commands.js"></script>  <!-- TEM QUE VIR PRIMEIRO -->
  <script src="../src/core/plugin.js"></script>
  <script src="../src/core/selection.js"></script>

  <!-- EDITOR -->
  <script src="../src/editor.js"></script>

  <!-- PLUGINS -->
  <script src="../src/plugins/toolbar.js"></script>
  <script src="../src/plugins/basic-commands.js"></script>
  <script src="../src/plugins/sanitizer.js"></script>
  <script src="../src/plugins/preview.js"></script>
  <script src="../src/plugins/normalizer.js"></script>

</head>
<body>

  <h1>Editor Demo</h1>

  <div id="editor"></div>

  <script>
    $('#editor').wysiwygEditor({
      plugins: [
        ToolbarPlugin,
        BasicCommandsPlugin,
        SanitizerPlugin,
        PreviewPlugin,
        NormalizerPlugin
      ]
    });
  </script>

</body>
</html>
